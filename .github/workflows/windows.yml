name: Windows

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup Nim
        shell: pwsh
        run: choco install nim -y --no-progress
      - name: Setup Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress
      - name: Install Nim dependencies
        shell: pwsh
        run: nimble install --depsOnly -y
        working-directory: ci
      - name: Test ConPTY integration
        shell: pwsh
        run: nim c --mm:arc --path:src -r tests/test_windows_terminal.nim
      - name: Test workspace watcher integration
        shell: pwsh
        run: nim c --mm:arc --path:src -r tests/test_workspace_watcher.nim
      - name: Test Windows platform contract
        shell: pwsh
        run: nim c --mm:arc --path:src -r tests/test_windows_platform_contract.nim
      - name: Test Windows native GPU text smoke
        shell: pwsh
        run: nim c --mm:arc --path:src -r tests/test_windows_native_smoke.nim
      - name: Build and package Windows application
        shell: pwsh
        run: .\scripts\package_windows.ps1 -Version 0.1.0
      - name: Verify Windows package outputs
        shell: pwsh
        run: |
          $zip = Get-Item "dist/windows/Nimculus-0.1.0-windows-x64.zip" -ErrorAction Stop
          $setups = @(Get-ChildItem "dist/windows/installer" -Filter "*.exe" -File)
          if ($zip.Length -le 0) { throw "ZIP artifact is empty" }
          if ($setups.Count -ne 1 -or $setups[0].Length -le 0) {
            throw "Expected exactly one non-empty installer"
          }
      - name: Smoke test Windows installer lifecycle
        shell: pwsh
        run: |
          $setup = Get-ChildItem "dist/windows/installer" -Filter "*.exe" -File | Select-Object -First 1
          $installDir = Join-Path $env:RUNNER_TEMP "nimculus-install-smoke"
          Remove-Item $installDir -Recurse -Force -ErrorAction SilentlyContinue
          $install = Start-Process -FilePath $setup.FullName -ArgumentList @(
            "/VERYSILENT", "/SUPPRESSMSGBOXES", "/NORESTART", "/DIR=$installDir"
          ) -Wait -PassThru
          if ($install.ExitCode -ne 0) { throw "Installer exited with $($install.ExitCode)" }
          $installedExe = Join-Path $installDir "nimculus.exe"
          if (-not (Test-Path $installedExe) -or (Get-Item $installedExe).Length -le 0) {
            throw "Installed executable is missing or empty"
          }
          $uninstaller = Join-Path $installDir "unins000.exe"
          if (-not (Test-Path $uninstaller)) { throw "Uninstaller is missing" }
          $uninstall = Start-Process -FilePath $uninstaller -ArgumentList @(
            "/VERYSILENT", "/SUPPRESSMSGBOXES", "/NORESTART"
          ) -Wait -PassThru
          if ($uninstall.ExitCode -ne 0) { throw "Uninstaller exited with $($uninstall.ExitCode)" }
          if (Test-Path $installDir) { throw "Install directory remains after uninstall" }
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nimculus-windows-x64
          path: dist/windows/
