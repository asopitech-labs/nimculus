name: macOS

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup Nim
        run: brew install nim
      - name: Install Nim dependencies
        run: nimble install --depsOnly -y
        working-directory: ci
      - name: Build
        run: nimble build
      - name: macOS bundle cold-start smoke
        run: |
          NIMCULUS_COLD_START_RUNS=1 \
          NIMCULUS_COLD_START_TIMEOUT_SECONDS=30 \
          bash scripts/benchmark_cold_start.sh
      - name: macOS idle soak smoke
        run: |
          NIMCULUS_SOAK_SECONDS=20 \
          NIMCULUS_SOAK_INTERVAL_SECONDS=5 \
          NIMCULUS_SOAK_TIMEOUT_SECONDS=40 \
          bash scripts/benchmark_soak.sh
      - name: Lint
        run: nimble lint
      - name: Test macOS implementation
        run: nimble test
      - name: Package smoke test
        run: |
          NIMCULUS_ALLOW_ADHOC=1 \
          NIMCULUS_OUT_DIR="$RUNNER_TEMP/nimculus-package" \
          bash scripts/package_macos.sh
          NIMCULUS_OUT_DIR="$RUNNER_TEMP/nimculus-package" \
          bash scripts/verify_macos_package.sh
