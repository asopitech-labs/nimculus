name: macOS

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Setup Nim
        run: brew install nim
      - name: Build
        run: nimble build
      - name: Lint
        run: nimble lint
      - name: Test
        run: nimble test
      - name: Package smoke test
        run: |
          NIMCULUS_ALLOW_ADHOC=1 \
          NIMCULUS_OUT_DIR="$RUNNER_TEMP/nimculus-package" \
          bash scripts/package_macos.sh
          codesign --verify --deep --strict "$RUNNER_TEMP/nimculus-package/Nimculus.app"
