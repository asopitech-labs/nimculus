name: macOS

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Setup Nim
        run: brew install nim
      - name: Install Nim dependencies
        run: nimble install --depsOnly -y
        working-directory: ci
      - name: Build
        run: nimble build
      - name: Compile portable platform boundary
        run: |
          nim c --compileOnly --os:linux --mm:arc --nimcache="$RUNNER_TEMP/nimculus-linux-compile" --path:src src/nimculus/main.nim
          nim c --compileOnly --os:windows -d:nimculusPortableOnly --mm:arc --nimcache="$RUNNER_TEMP/nimculus-windows-compile" --path:src src/nimculus/main.nim
      - name: Lint
        run: nimble lint
      - name: Test
        run: nimble test
      - name: Package smoke test
        run: |
          NIMCULUS_ALLOW_ADHOC=1 \
          NIMCULUS_OUT_DIR="$RUNNER_TEMP/nimculus-package" \
          bash scripts/package_macos.sh
          codesign --verify --deep --strict "$RUNNER_TEMP/nimculus-package/Nimculus.app"
